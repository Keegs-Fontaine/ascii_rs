<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="./index.js" defer></script>
    <title>Ascii RS</title>
</head>

<body>
    <form class="file-upload" action="">
        <label for="file-upload">Select a file:</label>
        <input class="file-input" type="file" id="file-upload" name="filename">

        <label for="scale">Scaling Factor:</label>
        <input required value="1" type="number" id="scale" name="scale-amount" class="scale-input">
        <button type="submit">Submit</button>
    </form>

    <pre style="font-size: 0.125rem" class="ascii-output"></pre>
</body>

</html>
